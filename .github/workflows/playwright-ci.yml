name: Playwright UI Automation - Parabank

# NOTE: Auto-triggers (push/pull_request) are paused while the suite is being
# stabilized, so runs don't fire on every commit during active fixes.
# Once the suite is confirmed stable, uncomment the push/pull_request block
# below and remove workflow_dispatch (or keep both).
on:
  workflow_dispatch:
  # push:
  #   branches: ["main"]
  # pull_request:
  #   branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Print Java & environment details
        run: |
          echo "JAVA_HOME = $JAVA_HOME"
          java -version
          mvn -v
          echo "MAVEN_OPTS = $MAVEN_OPTS"
          echo "PATH = $PATH"

      - name: Build project with Maven
        run: mvn -B clean compile

      - name: Install Playwright browser for Java
        run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Run UI automation tests (headless)
        run: mvn -B test -Dplaywright.headless=true

      - name: Create screenshots folder
        run: mkdir -p target/screenshots

      - name: Upload Test Artifacts & Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-artifacts
          path: |
            target/screenshots/
            target/surefire-reports/
            reports/
